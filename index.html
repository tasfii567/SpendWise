<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>SpendWise</title>
<meta name="theme-color" content="#2D5016"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="SpendWise"/>
<meta name="mobile-web-app-capable" content="yes"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png"/>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F5F7F2;
  --surface: #FFFFFF;
  --text: #1C1C1C;
  --muted: #8A8A8A;
  --border: #E6EAE0;
  --accent: #3A6B1E;
  --accent2: #6B9E3E;
  --accent-light: #EAF2E0;
  --red: #C0392B;
  --red-light: #FDECEA;
  --green: #27AE60;
  --green-light: #E9F7EF;
  --gold: #D4A017;
  --gold-light: #FDF6E3;
  --shadow: 0 2px 20px rgba(0,0,0,0.07);
  --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
}

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── SPLASH SCREEN ── */
#splash {
  position: fixed;
  inset: 0;
  background: linear-gradient(160deg, #2D5016 0%, #4A8025 50%, #6BAF35 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  transition: opacity 0.6s ease, transform 0.6s ease;
}

#splash.hide {
  opacity: 0;
  transform: scale(1.05);
  pointer-events: none;
}

.splash-icon {
  width: 110px;
  height: 110px;
  background: rgba(255,255,255,0.15);
  border-radius: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 1.5rem;
  backdrop-filter: blur(10px);
  border: 1.5px solid rgba(255,255,255,0.25);
  animation: iconPop 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
}

@keyframes iconPop {
  from { transform: scale(0.5); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.splash-icon svg {
  width: 60px;
  height: 60px;
}

.splash-title {
  font-family: 'Playfair Display', serif;
  font-size: 2.2rem;
  color: white;
  letter-spacing: -0.5px;
  animation: fadeUp 0.5s ease 0.4s both;
}

.splash-sub {
  font-size: 0.85rem;
  color: rgba(255,255,255,0.65);
  margin-top: 0.4rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  animation: fadeUp 0.5s ease 0.55s both;
}

.splash-loader {
  margin-top: 3rem;
  width: 40px;
  height: 3px;
  background: rgba(255,255,255,0.2);
  border-radius: 2px;
  overflow: hidden;
  animation: fadeUp 0.5s ease 0.6s both;
}

.splash-loader::after {
  content: '';
  display: block;
  height: 100%;
  width: 40%;
  background: white;
  border-radius: 2px;
  animation: loading 1.2s ease 0.8s forwards;
}

@keyframes loading {
  from { width: 0; }
  to { width: 100%; }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: none; }
}

/* ── MAIN APP ── */
#app {
  opacity: 0;
  transition: opacity 0.4s ease;
  padding: calc(var(--safe-top) + 1.25rem) 1rem calc(var(--safe-bottom) + 5rem);
  max-width: 680px;
  margin: 0 auto;
}

#app.visible { opacity: 1; }

/* Header */
.app-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.5rem;
}

.app-header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 1.6rem;
  font-weight: 400;
}

.header-right { display: flex; align-items: center; gap: 0.6rem; }

.currency-btn {
  background: var(--accent-light);
  border: none;
  border-radius: 20px;
  padding: 0.35rem 0.75rem;
  font-family: 'Nunito', sans-serif;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--accent);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

/* Date Navigator */
.date-nav {
  background: var(--surface);
  border-radius: 14px;
  padding: 0.75rem 1rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  margin-bottom: 1rem;
}

.date-nav button {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 1rem;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s;
}

.date-nav button:active { background: var(--accent-light); }

.date-nav-center { text-align: center; }

.date-nav-center .month-year {
  font-family: 'Playfair Display', serif;
  font-size: 1rem;
  font-weight: 400;
}

.date-nav-center .date-sub {
  font-size: 0.7rem;
  color: var(--muted);
  margin-top: 1px;
}

.date-nav-center .today-btn {
  background: none;
  border: none;
  color: var(--accent);
  font-size: 0.72rem;
  font-family: 'Nunito', sans-serif;
  font-weight: 600;
  cursor: pointer;
  padding: 0;
  margin-top: 2px;
  display: block;
  margin: 2px auto 0;
}

/* Summary */
.summary { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.6rem; margin-bottom: 1rem; }

.card {
  background: var(--surface);
  border-radius: 14px;
  padding: 0.9rem 0.8rem;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}

.card label {
  display: block;
  font-size: 0.65rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 0.35rem;
  font-weight: 600;
}

.card .amount {
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem;
  line-height: 1;
  word-break: break-all;
}

.card.income .amount { color: var(--green); }
.card.expense .amount { color: var(--red); }

/* Tabs */
.tabs {
  display: flex;
  background: var(--surface);
  border-radius: 12px;
  padding: 4px;
  gap: 4px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  margin-bottom: 1rem;
}

.tabs button {
  flex: 1;
  padding: 0.55rem 0.25rem;
  border: none;
  border-radius: 9px;
  font-family: 'Nunito', sans-serif;
  font-size: 0.78rem;
  font-weight: 600;
  cursor: pointer;
  background: transparent;
  color: var(--muted);
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}

.tabs button.active {
  background: var(--accent);
  color: white;
  box-shadow: 0 2px 8px rgba(58,107,30,0.3);
}

/* Panels */
.panel { display: none; flex-direction: column; gap: 1rem; }
.panel.active { display: flex; }

/* Form */
.form-card {
  background: var(--surface);
  border-radius: 16px;
  padding: 1.25rem;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}

.field { display: flex; flex-direction: column; gap: 0.3rem; margin-bottom: 0.75rem; }
.field:last-of-type { margin-bottom: 0; }

.field label {
  font-size: 0.7rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 600;
}

.field input, .field select {
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 0.65rem 0.85rem;
  font-family: 'Nunito', sans-serif;
  font-size: 0.95rem;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
  width: 100%;
  -webkit-appearance: none;
}

.field input:focus, .field select:focus { border-color: var(--accent); }

.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

.type-toggle {
  display: grid;
  grid-template-columns: 1fr 1fr;
  background: var(--bg);
  border-radius: 10px;
  padding: 3px;
  border: 1.5px solid var(--border);
  gap: 3px;
}

.type-toggle button {
  padding: 0.55rem;
  border: none;
  border-radius: 8px;
  font-family: 'Nunito', sans-serif;
  font-size: 0.85rem;
  cursor: pointer;
  font-weight: 600;
  transition: all 0.2s;
  background: transparent;
  color: var(--muted);
  -webkit-tap-highlight-color: transparent;
}

.type-toggle button.active-income { background: var(--green-light); color: var(--green); }
.type-toggle button.active-expense { background: var(--red-light); color: var(--red); }

.btn-add {
  width: 100%;
  margin-top: 1rem;
  padding: 0.85rem;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 12px;
  font-family: 'Nunito', sans-serif;
  font-size: 0.95rem;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.15s;
  -webkit-tap-highlight-color: transparent;
}

.btn-add:active { opacity: 0.8; transform: scale(0.98); }
.btn-add.success { background: var(--green); }

/* Goals */
.goal-card {
  background: var(--surface);
  border-radius: 16px;
  padding: 1.25rem;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}

.goal-card h3 {
  font-family: 'Playfair Display', serif;
  font-size: 1rem;
  font-weight: 400;
  color: var(--muted);
  margin-bottom: 1rem;
}

.goal-item {
  background: var(--bg);
  border-radius: 12px;
  padding: 1rem;
  margin-bottom: 0.75rem;
  border: 1px solid var(--border);
  animation: fadeIn 0.25s ease;
}

.goal-item:last-child { margin-bottom: 0; }

.goal-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 0.6rem;
}

.goal-name { font-size: 0.9rem; font-weight: 600; }
.goal-amounts { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

.goal-delete {
  background: none;
  border: none;
  color: var(--border);
  cursor: pointer;
  font-size: 0.85rem;
  -webkit-tap-highlight-color: transparent;
}
.goal-delete:active { color: var(--red); }

.goal-bar-wrap {
  background: var(--border);
  border-radius: 99px;
  height: 8px;
  overflow: hidden;
  margin-bottom: 0.4rem;
}

.goal-bar {
  height: 100%;
  border-radius: 99px;
  transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1);
}

.goal-remaining {
  font-size: 0.72rem;
  color: var(--muted);
  text-align: right;
}

.goal-remaining.done { color: var(--green); font-weight: 600; }

.add-goal-form {
  margin-top: 1rem;
  padding-top: 1rem;
  border-top: 1px solid var(--border);
}

.add-goal-form h4 {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--muted);
  font-weight: 600;
  margin-bottom: 0.75rem;
}

.btn-add-goal {
  width: 100%;
  padding: 0.7rem;
  background: var(--gold-light);
  color: var(--gold);
  border: 1.5px solid #E8C84A;
  border-radius: 10px;
  font-family: 'Nunito', sans-serif;
  font-size: 0.88rem;
  font-weight: 700;
  cursor: pointer;
  margin-top: 0.75rem;
  -webkit-tap-highlight-color: transparent;
}

/* Transactions */
.txn-card {
  background: var(--surface);
  border-radius: 16px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  overflow: hidden;
}

.txn-header {
  padding: 1rem 1.25rem 0.7rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--border);
}

.txn-header h2 {
  font-family: 'Playfair Display', serif;
  font-size: 1rem;
  font-weight: 400;
  color: var(--muted);
}

.filter-btns { display: flex; gap: 0.3rem; }

.filter-btns button {
  padding: 0.25rem 0.6rem;
  border: 1px solid var(--border);
  border-radius: 20px;
  font-family: 'Nunito', sans-serif;
  font-size: 0.7rem;
  cursor: pointer;
  background: var(--bg);
  color: var(--muted);
  font-weight: 600;
  -webkit-tap-highlight-color: transparent;
}

.filter-btns button.active { background: var(--accent); color: white; border-color: var(--accent); }

.txn-list { list-style: none; }

.txn-item {
  display: flex;
  align-items: center;
  padding: 0.85rem 1.25rem;
  border-bottom: 1px solid var(--border);
  gap: 0.75rem;
  animation: fadeIn 0.25s ease;
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: none; } }

.txn-item:last-child { border-bottom: none; }

.txn-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.95rem;
  flex-shrink: 0;
}

.txn-icon.income { background: var(--green-light); }
.txn-icon.expense { background: var(--red-light); }

.txn-info { flex: 1; min-width: 0; }
.txn-name { font-size: 0.87rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.txn-meta { font-size: 0.7rem; color: var(--muted); margin-top: 1px; }

.txn-amount { font-family: 'Playfair Display', serif; font-size: 0.95rem; flex-shrink: 0; }
.txn-amount.income { color: var(--green); }
.txn-amount.expense { color: var(--red); }

.txn-delete {
  background: none; border: none; color: var(--border);
  cursor: pointer; font-size: 0.85rem; padding: 0.3rem;
  border-radius: 6px; line-height: 1; flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.txn-delete:active { color: var(--red); }

.empty { text-align: center; padding: 2.5rem 1rem; color: var(--muted); font-size: 0.85rem; }
.empty span { display: block; font-size: 2rem; margin-bottom: 0.5rem; }

/* Currency Modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 500;
  align-items: flex-end;
  justify-content: center;
  backdrop-filter: blur(4px);
}

.modal-overlay.open { display: flex; }

.modal {
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  padding: 1.25rem 1.25rem calc(var(--safe-bottom) + 1.25rem);
  width: 100%;
  max-width: 680px;
  max-height: 75vh;
  overflow-y: auto;
  animation: slideUpModal 0.3s cubic-bezier(0.34,1.2,0.64,1);
}

@keyframes slideUpModal { from { transform: translateY(100%); } to { transform: none; } }

.modal h3 {
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem;
  font-weight: 400;
  margin-bottom: 1rem;
  text-align: center;
}

.modal input[type=text] {
  width: 100%;
  padding: 0.65rem 1rem;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-family: 'Nunito', sans-serif;
  font-size: 0.9rem;
  background: var(--bg);
  margin-bottom: 0.75rem;
  outline: none;
}

.modal input:focus { border-color: var(--accent); }

.currency-list { display: flex; flex-direction: column; gap: 0.4rem; }

.currency-option {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.7rem 0.9rem;
  border-radius: 10px;
  cursor: pointer;
  border: 1.5px solid transparent;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}

.currency-option:active { background: var(--accent-light); }
.currency-option.selected { border-color: var(--accent); background: var(--accent-light); }

.currency-symbol { font-size: 1.1rem; width: 28px; text-align: center; font-weight: 700; color: var(--accent); }
.currency-info .name { font-size: 0.88rem; font-weight: 600; }
.currency-info .code { font-size: 0.72rem; color: var(--muted); }
</style>
</head>
<body>

<!-- SPLASH SCREEN -->
<div id="splash">
  <div class="splash-icon">
    <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Leaf -->
      <path d="M30 8 C30 8 48 16 48 32 C48 44 40 52 30 52 C20 52 12 44 12 32 C12 16 30 8 30 8Z" fill="rgba(255,255,255,0.9)"/>
      <path d="M30 8 C30 8 30 30 30 52" stroke="rgba(58,107,30,0.5)" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M30 28 C24 22 18 20 14 22" stroke="rgba(58,107,30,0.35)" stroke-width="1.2" stroke-linecap="round"/>
      <path d="M30 36 C36 30 42 28 46 30" stroke="rgba(58,107,30,0.35)" stroke-width="1.2" stroke-linecap="round"/>
      <!-- Small coin -->
      <circle cx="42" cy="18" r="7" fill="rgba(255,255,255,0.3)" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
      <text x="42" y="22" text-anchor="middle" font-size="8" fill="white" font-weight="bold">$</text>
    </svg>
  </div>
  <div class="splash-title">SpendWise</div>
  <div class="splash-sub">Your money, your story</div>
  <div class="splash-loader"></div>
</div>

<!-- MAIN APP -->
<div id="app">

  <div class="app-header">
    <h1>SpendWise 🌿</h1>
    <div class="header-right">
      <button class="currency-btn" onclick="openCurrencyModal()" id="currency-display">৳ BDT</button>
    </div>
  </div>

  <!-- Date Navigator -->
  <div class="date-nav">
    <button onclick="changeMonth(-1)">‹</button>
    <div class="date-nav-center">
      <div class="month-year" id="month-year-label">March 2026</div>
      <div class="date-sub" id="txn-count-label">0 transactions</div>
      <button class="today-btn" onclick="goToToday()" id="today-btn" style="display:none">Back to today</button>
    </div>
    <button onclick="changeMonth(1)">›</button>
  </div>

  <!-- Summary -->
  <div class="summary">
    <div class="card balance">
      <label>Balance</label>
      <div class="amount" id="balance">0.00</div>
    </div>
    <div class="card income">
      <label>Income</label>
      <div class="amount" id="total-income">0.00</div>
    </div>
    <div class="card expense">
      <label>Expenses</label>
      <div class="amount" id="total-expense">0.00</div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="active" onclick="switchTab('add', this)">＋ Add</button>
    <button onclick="switchTab('goals', this)">🎯 Goals</button>
    <button onclick="switchTab('history', this)">📋 History</button>
  </div>

  <!-- Add Panel -->
  <div class="panel active" id="panel-add">
    <div class="form-card">
      <div class="field">
        <label>Description</label>
        <input type="text" id="desc" placeholder="e.g. Groceries" maxlength="40"/>
      </div>
      <div class="two-col">
        <div class="field">
          <label>Amount</label>
          <input type="number" id="amount" placeholder="0.00" min="0" step="0.01" inputmode="decimal"/>
        </div>
        <div class="field">
          <label>Date</label>
          <input type="date" id="date"/>
        </div>
      </div>
      <div class="field">
        <label>Category</label>
        <select id="category">
          <option value="🍔 Food">🍔 Food</option>
          <option value="🏠 Housing">🏠 Housing</option>
          <option value="🚗 Transport">🚗 Transport</option>
          <option value="💊 Health">💊 Health</option>
          <option value="🎉 Entertainment">🎉 Entertainment</option>
          <option value="🛍 Shopping">🛍 Shopping</option>
          <option value="💼 Work">💼 Work</option>
          <option value="📦 Other">📦 Other</option>
        </select>
      </div>
      <div class="field">
        <label>Type</label>
        <div class="type-toggle">
          <button id="btn-expense" class="active-expense" onclick="setType('expense')">Expense</button>
          <button id="btn-income" onclick="setType('income')">Income</button>
        </div>
      </div>
      <button class="btn-add" id="btn-add" onclick="addTransaction()">Add Transaction</button>
    </div>
  </div>

  <!-- Goals Panel -->
  <div class="panel" id="panel-goals">
    <div class="goal-card">
      <h3>Savings Goals 🎯</h3>
      <div id="goals-list"></div>
      <div class="add-goal-form">
        <h4>New Goal</h4>
        <div class="field">
          <label>Goal Name</label>
          <input type="text" id="goal-name" placeholder="e.g. New Phone, Vacation"/>
        </div>
        <div class="two-col">
          <div class="field">
            <label>Target Amount</label>
            <input type="number" id="goal-target" placeholder="0.00" inputmode="decimal"/>
          </div>
          <div class="field">
            <label>Saved So Far</label>
            <input type="number" id="goal-saved" placeholder="0.00" inputmode="decimal"/>
          </div>
        </div>
        <button class="btn-add-goal" onclick="addGoal()">＋ Add Goal</button>
      </div>
    </div>
  </div>

  <!-- History Panel -->
  <div class="panel" id="panel-history">
    <div class="txn-card">
      <div class="txn-header">
        <h2>Transactions</h2>
        <div class="filter-btns">
          <button class="active" onclick="setFilter('all', this)">All</button>
          <button onclick="setFilter('income', this)">In</button>
          <button onclick="setFilter('expense', this)">Out</button>
        </div>
      </div>
      <ul class="txn-list" id="txn-list"></ul>
    </div>
  </div>

</div>

<!-- Currency Modal -->
<div class="modal-overlay" id="currency-modal" onclick="closeCurrencyModal(event)">
  <div class="modal">
    <h3>Choose Currency 🌍</h3>
    <input type="text" id="currency-search" placeholder="Search currency..." oninput="filterCurrencies()"/>
    <div class="currency-list" id="currency-list"></div>
  </div>
</div>

<script>
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});

// ── DATA ──
const CURRENCIES = [
  { code: 'BDT', symbol: '৳', name: 'Bangladeshi Taka' },
  { code: 'USD', symbol: '$', name: 'US Dollar' },
  { code: 'EUR', symbol: '€', name: 'Euro' },
  { code: 'GBP', symbol: '£', name: 'British Pound' },
  { code: 'INR', symbol: '₹', name: 'Indian Rupee' },
  { code: 'JPY', symbol: '¥', name: 'Japanese Yen' },
  { code: 'CNY', symbol: '¥', name: 'Chinese Yuan' },
  { code: 'AUD', symbol: 'A$', name: 'Australian Dollar' },
  { code: 'CAD', symbol: 'C$', name: 'Canadian Dollar' },
  { code: 'CHF', symbol: 'Fr', name: 'Swiss Franc' },
  { code: 'KRW', symbol: '₩', name: 'South Korean Won' },
  { code: 'SGD', symbol: 'S$', name: 'Singapore Dollar' },
  { code: 'MYR', symbol: 'RM', name: 'Malaysian Ringgit' },
  { code: 'THB', symbol: '฿', name: 'Thai Baht' },
  { code: 'IDR', symbol: 'Rp', name: 'Indonesian Rupiah' },
  { code: 'PHP', symbol: '₱', name: 'Philippine Peso' },
  { code: 'PKR', symbol: '₨', name: 'Pakistani Rupee' },
  { code: 'VND', symbol: '₫', name: 'Vietnamese Dong' },
  { code: 'AED', symbol: 'د.إ', name: 'UAE Dirham' },
  { code: 'SAR', symbol: '﷼', name: 'Saudi Riyal' },
  { code: 'TRY', symbol: '₺', name: 'Turkish Lira' },
  { code: 'BRL', symbol: 'R$', name: 'Brazilian Real' },
  { code: 'MXN', symbol: '$', name: 'Mexican Peso' },
  { code: 'ZAR', symbol: 'R', name: 'South African Rand' },
  { code: 'NGN', symbol: '₦', name: 'Nigerian Naira' },
  { code: 'EGP', symbol: 'E£', name: 'Egyptian Pound' },
  { code: 'RUB', symbol: '₽', name: 'Russian Ruble' },
  { code: 'NOK', symbol: 'kr', name: 'Norwegian Krone' },
  { code: 'SEK', symbol: 'kr', name: 'Swedish Krona' },
  { code: 'DKK', symbol: 'kr', name: 'Danish Krone' },
  { code: 'NZD', symbol: 'NZ$', name: 'New Zealand Dollar' },
  { code: 'HKD', symbol: 'HK$', name: 'Hong Kong Dollar' },
  { code: 'TWD', symbol: 'NT$', name: 'Taiwan Dollar' },
  { code: 'CZK', symbol: 'Kč', name: 'Czech Koruna' },
  { code: 'PLN', symbol: 'zł', name: 'Polish Zloty' },
  { code: 'HUF', symbol: 'Ft', name: 'Hungarian Forint' },
  { code: 'ILS', symbol: '₪', name: 'Israeli Shekel' },
  { code: 'QAR', symbol: '﷼', name: 'Qatari Rial' },
  { code: 'KWD', symbol: 'د.ك', name: 'Kuwaiti Dinar' },
];

let transactions = JSON.parse(localStorage.getItem('sw_transactions') || '[]');
let goals = JSON.parse(localStorage.getItem('sw_goals') || '[]');
let currency = JSON.parse(localStorage.getItem('sw_currency') || '{"code":"BDT","symbol":"৳","name":"Bangladeshi Taka"}');
let currentType = 'expense';
let currentFilter = 'all';
let viewDate = new Date();

const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const monthsShort = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ── SPLASH ──
window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('splash').classList.add('hide');
    setTimeout(() => {
      document.getElementById('splash').style.display = 'none';
      document.getElementById('app').classList.add('visible');
    }, 600);
  }, 2000);
});

// ── INIT ──
document.getElementById('date').valueAsDate = new Date();
updateCurrencyDisplay();
updateDateLabel();
updateSummary();
renderGoals();

// ── CURRENCY ──
function updateCurrencyDisplay() {
  document.getElementById('currency-display').textContent = `${currency.symbol} ${currency.code}`;
}

function openCurrencyModal() {
  document.getElementById('currency-modal').classList.add('open');
  document.getElementById('currency-search').value = '';
  renderCurrencyList(CURRENCIES);
  setTimeout(() => document.getElementById('currency-search').focus(), 300);
}

function closeCurrencyModal(e) {
  if (e.target === document.getElementById('currency-modal')) {
    document.getElementById('currency-modal').classList.remove('open');
  }
}

function filterCurrencies() {
  const q = document.getElementById('currency-search').value.toLowerCase();
  renderCurrencyList(CURRENCIES.filter(c => c.name.toLowerCase().includes(q) || c.code.toLowerCase().includes(q)));
}

function renderCurrencyList(list) {
  document.getElementById('currency-list').innerHTML = list.map(c => `
    <div class="currency-option ${c.code === currency.code ? 'selected' : ''}" onclick="selectCurrency('${c.code}')">
      <div class="currency-symbol">${c.symbol}</div>
      <div class="currency-info">
        <div class="name">${c.name}</div>
        <div class="code">${c.code}</div>
      </div>
    </div>
  `).join('');
}

function selectCurrency(code) {
  currency = CURRENCIES.find(c => c.code === code);
  localStorage.setItem('sw_currency', JSON.stringify(currency));
  updateCurrencyDisplay();
  updateSummary();
  render();
  renderGoals();
  document.getElementById('currency-modal').classList.remove('open');
}

// ── DATE NAV ──
function changeMonth(dir) {
  viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth() + dir, 1);
  updateDateLabel();
  updateSummary();
  render();
}

function goToToday() {
  viewDate = new Date();
  updateDateLabel();
  updateSummary();
  render();
}

function updateDateLabel() {
  const now = new Date();
  const isCurrentMonth = viewDate.getMonth() === now.getMonth() && viewDate.getFullYear() === now.getFullYear();
  document.getElementById('month-year-label').textContent = `${months[viewDate.getMonth()]} ${viewDate.getFullYear()}`;
  document.getElementById('today-btn').style.display = isCurrentMonth ? 'none' : 'block';

  const filtered = getFilteredByMonth();
  document.getElementById('txn-count-label').textContent = `${filtered.length} transaction${filtered.length !== 1 ? 's' : ''}`;
}

function getFilteredByMonth() {
  return transactions.filter(t => {
    const d = new Date(t.date);
    return d.getMonth() === viewDate.getMonth() && d.getFullYear() === viewDate.getFullYear();
  });
}

// ── TABS ──
function switchTab(tab, btn) {
  document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  if (tab === 'history') render();
}

// ── TYPE ──
function setType(type) {
  currentType = type;
  document.getElementById('btn-expense').className = type === 'expense' ? 'active-expense' : '';
  document.getElementById('btn-income').className = type === 'income' ? 'active-income' : '';
}

// ── ADD TRANSACTION ──
function addTransaction() {
  const desc = document.getElementById('desc').value.trim();
  const amount = parseFloat(document.getElementById('amount').value);
  const date = document.getElementById('date').value;
  const category = document.getElementById('category').value;

  if (!desc) { flash('desc'); return; }
  if (!amount || amount <= 0) { flash('amount'); return; }
  if (!date) { flash('date'); return; }

  transactions.unshift({ id: Date.now(), desc, amount, date, category, type: currentType });
  save();

  // sync view to transaction's month
  const d = new Date(date);
  viewDate = new Date(d.getFullYear(), d.getMonth(), 1);

  updateDateLabel();
  updateSummary();

  document.getElementById('desc').value = '';
  document.getElementById('amount').value = '';
  document.getElementById('date').valueAsDate = new Date();

  const btn = document.getElementById('btn-add');
  btn.textContent = '✓ Added!';
  btn.classList.add('success');
  setTimeout(() => { btn.textContent = 'Add Transaction'; btn.classList.remove('success'); }, 1500);
}

function flash(id) {
  const el = document.getElementById(id);
  el.style.borderColor = '#C0392B';
  el.focus();
  setTimeout(() => el.style.borderColor = '', 1200);
}

function deleteTransaction(id) {
  transactions = transactions.filter(t => t.id !== id);
  save();
  updateDateLabel();
  updateSummary();
  render();
}

function save() {
  localStorage.setItem('sw_transactions', JSON.stringify(transactions));
}

// ── GOALS ──
function addGoal() {
  const name = document.getElementById('goal-name').value.trim();
  const target = parseFloat(document.getElementById('goal-target').value);
  const saved = parseFloat(document.getElementById('goal-saved').value) || 0;

  if (!name) { flashEl(document.getElementById('goal-name')); return; }
  if (!target || target <= 0) { flashEl(document.getElementById('goal-target')); return; }

  goals.push({ id: Date.now(), name, target, saved });
  localStorage.setItem('sw_goals', JSON.stringify(goals));

  document.getElementById('goal-name').value = '';
  document.getElementById('goal-target').value = '';
  document.getElementById('goal-saved').value = '';

  renderGoals();
}

function deleteGoal(id) {
  goals = goals.filter(g => g.id !== id);
  localStorage.setItem('sw_goals', JSON.stringify(goals));
  renderGoals();
}

function flashEl(el) {
  el.style.borderColor = '#C0392B';
  el.focus();
  setTimeout(() => el.style.borderColor = '', 1200);
}

function renderGoals() {
  const list = document.getElementById('goals-list');
  if (!goals.length) {
    list.innerHTML = `<div class="empty"><span>🎯</span>No goals yet — add one below!</div>`;
    return;
  }

  list.innerHTML = goals.map(g => {
    const pct = Math.min(100, (g.saved / g.target) * 100);
    const remaining = g.target - g.saved;
    const done = remaining <= 0;
    const color = done ? '#27AE60' : pct > 66 ? '#6BAF3E' : pct > 33 ? '#D4A017' : '#C0392B';

    return `
      <div class="goal-item">
        <div class="goal-top">
          <div>
            <div class="goal-name">${g.name} ${done ? '🎉' : ''}</div>
            <div class="goal-amounts">${currency.symbol}${fmt(g.saved)} saved of ${currency.symbol}${fmt(g.target)}</div>
          </div>
          <button class="goal-delete" onclick="deleteGoal(${g.id})">✕</button>
        </div>
        <div class="goal-bar-wrap">
          <div class="goal-bar" style="width:${pct}%;background:${color}"></div>
        </div>
        <div class="goal-remaining ${done ? 'done' : ''}">
          ${done ? '✅ Goal reached!' : `${currency.symbol}${fmt(remaining)} to go · ${pct.toFixed(0)}%`}
        </div>
      </div>
    `;
  }).join('');
}

// ── SUMMARY ──
function updateSummary() {
  const monthly = getFilteredByMonth();
  const income = monthly.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
  const expense = monthly.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
  document.getElementById('total-income').textContent = fmt(income);
  document.getElementById('total-expense').textContent = fmt(expense);
  document.getElementById('balance').textContent = fmt(income - expense);
}

// ── RENDER TRANSACTIONS ──
function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btns button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const list = document.getElementById('txn-list');
  let filtered = getFilteredByMonth();
  if (currentFilter !== 'all') filtered = filtered.filter(t => t.type === currentFilter);

  if (!filtered.length) {
    list.innerHTML = `<div class="empty"><span>📋</span>No transactions for ${months[viewDate.getMonth()]}</div>`;
    return;
  }

  list.innerHTML = filtered.map(t => `
    <li class="txn-item">
      <div class="txn-icon ${t.type}">${t.category.split(' ')[0]}</div>
      <div class="txn-info">
        <div class="txn-name">${t.desc}</div>
        <div class="txn-meta">${t.category.split(' ').slice(1).join(' ')} · ${formatDate(t.date)}</div>
      </div>
      <div class="txn-amount ${t.type}">${t.type === 'income' ? '+' : '−'}${currency.symbol}${fmt(t.amount)}</div>
      <button class="txn-delete" onclick="deleteTransaction(${t.id})">✕</button>
    </li>
  `).join('');
}

function fmt(n) {
  return n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function formatDate(d) {
  const [y, m, day] = d.split('-');
  return `${monthsShort[parseInt(m)-1]} ${parseInt(day)}, ${y}`;
}
</script>
</body>
         </html>
